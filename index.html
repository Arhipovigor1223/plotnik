<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Тест: Документообіг</title>

<style>
body{
    margin:0;
    font-family:"Times New Roman", serif;
    background:#eaeef3;
}

/* ТИТУЛЬНА */
.title-page{
    width:100%;
    height:100vh;
    background:white;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    padding:60px 80px;
    box-sizing:border-box;
    border:8px solid #2b7cff;
}

.top{
    text-align:center;
    font-size:20px;
    letter-spacing:1px;
}

.center{
    text-align:center;
}

.center h1{
    display:inline-block;
    background:linear-gradient(45deg, #2b7cff, #6ec1ff);
    color:white;
    padding:10px 40px;
    font-size:46px;
    margin-bottom:20px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.subtitle{
    font-size:18px;
    margin-bottom:30px;
    color:#555;
}

.topic{
    font-size:30px;
    margin-bottom:20px;
}

.line{
    width:200px;
    height:3px;
    background:#2b7cff;
    margin:20px auto;
}

.bottom{
    text-align:right;
    font-size:18px;
    line-height:1.6;
}

.year{
    text-align:center;
    font-size:18px;
}

/* КНОПКА */
.start-btn{
    margin-top:30px;
    padding:14px 28px;
    font-size:18px;
    background:#2b7cff;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.start-btn:hover{
    background:#1a5ed8;
}

/* ТЕСТ */
.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    display:none;
}

h2{text-align:center}

.question{
    margin-bottom:20px;
    padding:15px;
    border-bottom:1px solid #ddd;
}

button{
    padding:12px 20px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#2b7cff;
    color:white;
    cursor:pointer;
}

#result{
    font-size:20px;
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<!-- ТИТУЛЬНА -->
<div class="title-page" id="titlePage">

    <div class="top">
        Ліцей № 4 "Успіх"
    </div>

    <div class="center">
        <h1>РЕФЕРАТ</h1>
        <div class="subtitle">з інформатики</div>

        <div class="line"></div>

        <div class="topic">
            «Історія розвитку комп'ютерної техніки»
        </div>

        <div class="line"></div>

        <button class="start-btn" onclick="startTest()">Перейти до тесту</button>
    </div>

    <div class="bottom">
        Підготувала:<br>
        учениця 10-Б класу<br>
        <b>Плотник Владислава</b><br><br>

        Перевірила:<br>
        Борискіна Ганна Володимирівна
    </div>

    <div class="year">2026</div>

</div>

<!-- ТЕСТ -->
<div class="container" id="test">

<h2>Тест з теми "Документообіг"</h2>
<p style="text-align:center;font-style:italic;">Автор: Плотник Владислава</p>

<form id="quiz">

<div class="question">
<p>1. Що таке документообіг?</p>
<label><input type="radio" name="q1" value="0"> Процес зберігання документів</label><br>
<label><input type="radio" name="q1" value="1"> Рух документів від створення до завершення виконання</label><br>
<label><input type="radio" name="q1" value="0"> Архівування документів</label><br>
<label><input type="radio" name="q1" value="0"> Знищення документів</label>
</div>

<!-- далі твій тест -->

<button type="button" onclick="checkQuiz()">Перевірити результат</button>

</form>

<div id="result"></div>
</div>

<script>
function startTest(){
    document.getElementById("titlePage").style.display = "none";
    document.getElementById("test").style.display = "block";
}

function checkQuiz(){
    let score = 0;
    const form = document.getElementById('quiz');
    const data = new FormData(form);
    for (let value of data.values()){
        score += Number(value);
    }
    document.getElementById('result').innerText = "Ваш результат: " + score + " балів";
}
</script>

</body>
</html>
