<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Реферат</title>
<style>
body {
    font-family: "Times New Roman", serif;
    background: white;
    margin: 0;
    padding: 0;
}
.page {
    width: 800px;
    height: 1100px;
    margin: 30px auto;
    position: relative;
}
.top {
    text-align: center;
    margin-top: 40px;
    font-size: 18px;
}
.title {
    text-align: center;
    margin-top: 200px;
}
.title h1 {
    display: inline-block;
    background: yellow;
    padding: 5px 20px;
    font-size: 42px;
}
.topic {
    text-align: center;
    margin-top: 40px;
    font-size: 28px;
}
.bottom {
    position: absolute;
    right: 0;
    bottom: 120px;
    text-align: left;
    font-size: 18px;
    line-height: 1.6;
}
.year {
    text-align: center;
    position: absolute;
    bottom: 40px;
    width: 100%;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="page">

    <div class="top">
        Ліцей № 4 "Успіх"
    </div>

    <div class="title">
        <h1>РЕФЕРАТ</h1>
    </div>

    <div class="topic">
        «Історія розвитку комп'ютерної техніки»
    </div>

    <div class="bottom">
        Підготувала:<br>
        учениця 10-Б класу<br>
        <b>Плотник Владислава</b><br><br>

        Перевірив(ла):<br>
        вчитель інформатики
    </div>

    <div class="year">
        2026
    </div>

</div>

</body>
</html>
